<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://user-assets.sxlcdn.com/images/1209238/FlWuslNmGTHt1EipxUtq2GI6zqnN.png?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" type="image/png">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>汇率转换器</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            margin: 0;
            padding: 0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #fff;
            background: #333;
            color: #fff;
            font-size: 1.1rem;
        }

        button {
            background-color: #4CAF50;
            color: #fff;
            padding: 15px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            font-size: 1.3rem;
        }

        .result span {
            font-weight: bold;
        }

        .currency-section {
            text-align: left;
            margin-bottom: 10px;
        }

        .currency-section h3 {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>汇率转换器</h1>

        <div class="currency-section">
            <h3>待转换货币</h3>
            <input type="number" id="amount" placeholder="输入金额" />
            <select id="fromCurrency">
                <option value="USD">美元 (USD)</option>
                <option value="EUR">欧元 (EUR)</option>
                <option value="GBP">英镑 (GBP)</option>
                <option value="CNY">人民币 (CNY)</option>
                <option value="JPY">日元 (JPY)</option>
                <option value="AUD">澳大利亚元 (AUD)</option>
                <option value="CAD">加拿大元 (CAD)</option>
                <option value="RUB">俄罗斯卢布 (RUB)</option>
                <option value="HKD">港元 (HKD)</option>
                <option value="SGD">新加坡元 (SGD)</option>
                <option value="CHF">瑞士法郎 (CHF)</option>
                <option value="KRW">韩元 (KRW)</option>
                <option value="INR">印度卢比 (INR)</option>
                <option value="NZD">新西兰元 (NZD)</option>
                <option value="THB">泰铢 (THB)</option>
                <option value="MYR">马来西亚林吉特 (MYR)</option>
                <option value="AED">阿联酋迪拉姆 (AED)</option>
                <option value="MXN">墨西哥比索 (MXN)</option>
                <option value="BRL">巴西雷亚尔 (BRL)</option>
                <option value="ZAR">南非兰特 (ZAR)</option>
                <option value="TRY">土耳其里拉 (TRY)</option>
                <option value="SEK">瑞典克朗 (SEK)</option>
                <option value="NOK">挪威克朗 (NOK)</option>
                <option value="DKK">丹麦克朗 (DKK)</option>
            </select>
        </div>

        <div class="currency-section">
            <h3>目标转换货币</h3>
            <select id="toCurrency">
                <option value="CNY">人民币 (CNY)</option>
                <option value="USD">美元 (USD)</option>
                <option value="EUR">欧元 (EUR)</option>
                <option value="GBP">英镑 (GBP)</option>
                <option value="JPY">日元 (JPY)</option>
                <option value="AUD">澳大利亚元 (AUD)</option>
                <option value="CAD">加拿大元 (CAD)</option>
                <option value="RUB">俄罗斯卢布 (RUB)</option>
                <option value="HKD">港元 (HKD)</option>
                <option value="SGD">新加坡元 (SGD)</option>
                <option value="CHF">瑞士法郎 (CHF)</option>
                <option value="KRW">韩元 (KRW)</option>
                <option value="INR">印度卢比 (INR)</option>
                <option value="NZD">新西兰元 (NZD)</option>
                <option value="THB">泰铢 (THB)</option>
                <option value="MYR">马来西亚林吉特 (MYR)</option>
                <option value="AED">阿联酋迪拉姆 (AED)</option>
                <option value="MXN">墨西哥比索 (MXN)</option>
                <option value="BRL">巴西雷亚尔 (BRL)</option>
                <option value="ZAR">南非兰特 (ZAR)</option>
                <option value="TRY">土耳其里拉 (TRY)</option>
                <option value="SEK">瑞典克朗 (SEK)</option>
                <option value="NOK">挪威克朗 (NOK)</option>
                <option value="DKK">丹麦克朗 (DKK)</option>
            </select>
        </div>

        <button onclick="convertCurrency()">转换</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        const resultElement = document.getElementById('result');
        const API_BASE = 'https://open.er-api.com/v6/latest/';
        const rateCache = {};

        async function getRates(baseCurrency) {
            if (rateCache[baseCurrency]) {
                return rateCache[baseCurrency];
            }

            const response = await fetch(`${API_BASE}${baseCurrency}`);
            if (!response.ok) {
                throw new Error('网络请求失败');
            }

            const data = await response.json();
            if (data.result !== 'success' || !data.rates) {
                throw new Error('实时汇率获取失败');
            }

            rateCache[baseCurrency] = data;
            return data;
        }

        async function convertCurrency() {
            const amount = parseFloat(document.getElementById('amount').value);
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;

            if (isNaN(amount) || amount <= 0) {
                resultElement.innerText = '请输入有效金额';
                return;
            }

            if (fromCurrency === toCurrency) {
                resultElement.innerText = '请选择不同的货币进行转换';
                return;
            }

            resultElement.innerText = '正在获取实时汇率...';

            try {
                const data = await getRates(fromCurrency);
                const rate = data.rates[toCurrency];

                if (rate === undefined) {
                    resultElement.innerText = '该货币对暂不支持实时转换';
                    return;
                }

                const converted = amount * rate;
                const updateTime = data.time_last_update_utc || '实时更新';
                resultElement.innerHTML = `<span>${amount}</span> ${fromCurrency} = <span>${converted.toFixed(5)}</span> ${toCurrency}<br><small>汇率更新时间：${updateTime}</small>`;
            } catch (error) {
                resultElement.innerText = '实时汇率获取失败，请检查网络后重试';
            }
        }
    </script>
</body>
</html>
